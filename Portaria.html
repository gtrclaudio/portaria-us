/* From Uiverse.io by alexmaracinaru */ 
button {
  cursor: pointer;
  font-weight: 400;
  transition: all 0.2s;
  padding: 10px 20px;
  border-radius: 100px;
  margin-right:1em;
  margin-bottom:1em;
  background: #AACD00;
  border: 1px solid transparent;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: "DM Sans", sans-serif;
  COLOR:#FFF;
  font-size: 25px;
  width:500px;
}

button:hover {
  background: #edf1ea;
  color:#0C3C5D;
}

button > svg {
  width: 34px;
  margin-left: 10px;
  transition: transform 0.3s ease-in-out;
}

button:hover svg {
  transform: translateX(5px);
}

button:active {
  transform: scale(0.95);
}
/** MENU DROPDOWN **/
ul li {

li ul {

	left: 16px;
	top:40px;
	display: none;
	}	
	li ul li{
	 
	}
ul li a {
	display: block;
	text-decoration: none;
	width:350px;
	font-family: "DM Sans", sans-serif;
	font-size:1.5rem;
	padding:4px 2px;
	color: #777;
	background: #fff;
	padding: 5px;
	border: 1px solid #ccc;
	border-bottom: 0;
	}
	
	li:hover ul, li.over ul { 
	display: block; 
	}
	li ul:hover{
	  transition:all .10s ease;
	}
	
	ul li a:hover{
	  transition: all .7s ease;
	  background:#0c3c5d;
	  border-bottom:2px solid #AACD00;
	  color: white;
	}
